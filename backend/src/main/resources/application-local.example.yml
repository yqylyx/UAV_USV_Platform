spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/uav_usv_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

app:
  integration:
    token: ${PLATFORM_INTEGRATION_TOKEN:uav-usv-local-agent}
  security:
    bootstrap-admin:
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${BOOTSTRAP_ADMIN_PASSWORD}
  control:
    wsl-distribution: ${WSL_DISTRIBUTION:Ubuntu22}
    ros-script: ${ROS_RUNTIME_SCRIPT:F:/UAV_USV_Platform/scripts/uav-usv-runtime.sh}
    unity-editor: ${UNITY_EDITOR_PATH:F:/Unity/Editors/2022.3.57f1/Editor/Unity.exe}
    unity-project: ${UNITY_PROJECT_PATH:F:/Unity/Projects/unity_ws}
  runtime:
    ros-websocket-url: ${ROS_WEBSOCKET_URL:ws://127.0.0.1:8765/uav_usv}
